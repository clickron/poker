<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No-Limit Texas Hold'em</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>No-Limit Texas Hold'em</h1>

        <!-- Game Info -->
        <div class="game-info">
            <div class="pot-display">Pot: $<span id="pot">0</span></div>
            <div class="blinds-display">Blinds: $<span id="small-blind">10</span>/$<span id="big-blind">20</span></div>
        </div>

        <!-- Poker Table -->
        <div class="poker-table">
            <!-- Community Cards -->
            <div class="community-cards" id="community-cards">
                <div class="card-slot" id="flop1"></div>
                <div class="card-slot" id="flop2"></div>
                <div class="card-slot" id="flop3"></div>
                <div class="card-slot" id="turn"></div>
                <div class="card-slot" id="river"></div>
            </div>

            <!-- Players -->
            <div class="player player-0" id="player-0">
                <div class="player-info">
                    <span class="player-name">You</span>
                    <span class="player-chips">$<span class="chip-count">1000</span></span>
                    <span class="player-bet">Bet: $<span class="bet-amount">0</span></span>
                    <span class="dealer-btn" style="display:none;">D</span>
                </div>
                <div class="player-cards">
                    <div class="card-slot hole1"></div>
                    <div class="card-slot hole2"></div>
                </div>
                <div class="player-status"></div>
            </div>

            <div class="player player-1" id="player-1">
                <div class="player-info">
                    <span class="player-name">Alice</span>
                    <span class="player-chips">$<span class="chip-count">1000</span></span>
                    <span class="player-bet">Bet: $<span class="bet-amount">0</span></span>
                    <span class="dealer-btn" style="display:none;">D</span>
                </div>
                <div class="player-cards">
                    <div class="card-slot hole1"></div>
                    <div class="card-slot hole2"></div>
                </div>
                <div class="player-status"></div>
            </div>

            <div class="player player-2" id="player-2">
                <div class="player-info">
                    <span class="player-name">Bob</span>
                    <span class="player-chips">$<span class="chip-count">1000</span></span>
                    <span class="player-bet">Bet: $<span class="bet-amount">0</span></span>
                    <span class="dealer-btn" style="display:none;">D</span>
                </div>
                <div class="player-cards">
                    <div class="card-slot hole1"></div>
                    <div class="card-slot hole2"></div>
                </div>
                <div class="player-status"></div>
            </div>

            <div class="player player-3" id="player-3">
                <div class="player-info">
                    <span class="player-name">Charlie</span>
                    <span class="player-chips">$<span class="chip-count">1000</span></span>
                    <span class="player-bet">Bet: $<span class="bet-amount">0</span></span>
                    <span class="dealer-btn" style="display:none;">D</span>
                </div>
                <div class="player-cards">
                    <div class="card-slot hole1"></div>
                    <div class="card-slot hole2"></div>
                </div>
                <div class="player-status"></div>
            </div>

            <div class="player player-4" id="player-4">
                <div class="player-info">
                    <span class="player-name">Diana</span>
                    <span class="player-chips">$<span class="chip-count">1000</span></span>
                    <span class="player-bet">Bet: $<span class="bet-amount">0</span></span>
                    <span class="dealer-btn" style="display:none;">D</span>
                </div>
                <div class="player-cards">
                    <div class="card-slot hole1"></div>
                    <div class="card-slot hole2"></div>
                </div>
                <div class="player-status"></div>
            </div>
        </div>

        <!-- Controls -->
        <div class="controls" id="controls">
            <div class="action-buttons">
                <button id="fold-btn" class="btn btn-fold">Fold</button>
                <button id="check-btn" class="btn btn-check">Check</button>
                <button id="call-btn" class="btn btn-call">Call $<span id="call-amount">0</span></button>
                <button id="raise-btn" class="btn btn-raise">Raise</button>
                <button id="allin-btn" class="btn btn-allin">All-In</button>
            </div>
            <div class="raise-controls" id="raise-controls" style="display: none;">
                <input type="range" id="raise-slider" min="0" max="1000" value="0">
                <input type="number" id="raise-input" min="0" max="1000" value="0">
                <div class="raise-presets">
                    <button class="preset-btn" data-multiplier="0.5">1/2 Pot</button>
                    <button class="preset-btn" data-multiplier="0.75">3/4 Pot</button>
                    <button class="preset-btn" data-multiplier="1">Pot</button>
                    <button class="preset-btn" data-multiplier="2">2x Pot</button>
                </div>
                <button id="confirm-raise" class="btn btn-confirm">Confirm Raise</button>
                <button id="cancel-raise" class="btn btn-cancel">Cancel</button>
            </div>
        </div>

        <!-- Game Messages -->
        <div class="message-area" id="message-area"></div>

        <!-- Player Chat -->
        <div class="chat-area" id="chat-area"></div>

        <!-- New Game / Settings -->
        <div class="game-controls">
            <button id="new-game-btn" class="btn btn-new-game">New Game</button>
            <button id="next-hand-btn" class="btn btn-next-hand" style="display: none;">Next Hand</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
